<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="出勤打刻">
<meta name="theme-color" content="#0f0f0f">
<title>出勤打刻</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --accent:#e8ff3e;--accent-dim:rgba(232,255,62,0.12);
  --green:#3ddc84;--green-dim:rgba(61,220,132,0.12);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);
  --radius:14px;--radius-sm:8px;
  --font:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overscroll-behavior:none;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.screen{display:none;flex-direction:column;min-height:100vh;padding:40px 24px;align-items:center;justify-content:center;gap:16px;}
.screen.active{display:flex;}
.card{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px;}
.form-field{margin-bottom:14px;}
.form-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;}
input,select{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;padding:12px 14px;outline:none;-webkit-appearance:none;transition:border-color 0.2s;}
input:focus,select:focus{border-color:var(--accent);}
option{background:var(--bg3);}
.btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-accent{background:var(--accent);color:#0f0f0f;}
.btn-accent:active{transform:scale(0.97);}
.btn-ghost{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2);}
.btn-danger{background:var(--red-dim);color:var(--red);border:0.5px solid rgba(255,107,107,0.3);}
.btn-blue{background:var(--blue-dim);color:var(--blue);border:0.5px solid rgba(96,165,250,0.3);}
.main-screen{display:none;flex-direction:column;height:100vh;}
.main-screen.active{display:flex;}
.pages{flex:1;overflow:hidden;padding-bottom:80px;}
.page{display:none;height:100%;overflow-y:auto;padding:24px 16px;}
.page.active{display:block;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--text2);margin-bottom:20px;}
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,15,15,0.94);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-family:var(--font);font-size:10px;transition:color 0.2s;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:22px;line-height:1;}
.info-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;}
.info-label{font-size:11px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px;}
.info-value{font-size:16px;font-weight:500;}
.type-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.type-btn{padding:16px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;text-align:center;}
.type-btn.active.in{background:var(--green-dim);color:var(--green);border-color:rgba(61,220,132,0.4);}
.type-btn.active.out{background:var(--red-dim);color:var(--red);border-color:rgba(255,107,107,0.4);}
.conn-bar{display:flex;align-items:center;font-size:11px;color:var(--text2);padding:6px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:14px;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-on{background:var(--green);}
.dot-off{background:var(--red);}
.hist-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.hist-time{font-size:11px;color:var(--text2);min-width:42px;}
.hist-info{flex:1;}
.hist-loc{font-size:13px;font-weight:500;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-in{background:var(--green-dim);color:var(--green);}
.badge-out{background:var(--red-dim);color:var(--red);}
.badge-online{background:var(--blue-dim);color:var(--blue);}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px;}
.divider{height:0.5px;background:var(--border);margin:16px 0;}
.scan-result{border-radius:var(--radius-sm);padding:14px;text-align:center;font-size:14px;font-weight:500;margin-top:12px;animation:fadeIn 0.2s ease;}
.scan-result.ok{background:var(--green-dim);color:var(--green);border:0.5px solid rgba(61,220,132,0.3);}
.scan-result.ng{background:var(--red-dim);color:var(--red);border:0.5px solid rgba(255,107,107,0.3);}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.online-btn{width:100%;padding:16px;border-radius:var(--radius);background:var(--blue-dim);color:var(--blue);border:0.5px solid rgba(96,165,250,0.3);font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
.online-btn:active{transform:scale(0.97);}
.wt-select-wrap{display:none;margin-bottom:12px;}
.wt-select-wrap.show{display:block;}
</style>
</head>
<body>

<!-- CONFIG -->
<div class="screen" id="screen-config">
  <div style="font-size:52px">⏱</div>
  <div style="font-size:22px;font-weight:700">出勤打刻アプリ</div>
  <div style="font-size:13px;color:var(--text2);text-align:center">初回設定：管理者から受け取ったURLとキーを入力</div>
  <div class="card">
    <div class="form-field"><label>Supabase URL</label><input type="url" id="cfg-url" placeholder="https://xxxx.supabase.co"></div>
    <div class="form-field"><label>Anon Key</label><input type="text" id="cfg-key" placeholder="eyJhbGci..."></div>
    <button class="btn btn-accent" onclick="saveConfig()">次へ →</button>
  </div>
</div>

<!-- NAME SELECT -->
<div class="screen" id="screen-name">
  <div style="font-size:52px">👤</div>
  <div style="font-size:22px;font-weight:700">あなたは誰ですか？</div>
  <div style="font-size:13px;color:var(--text2)">一覧から自分の名前を選んでください</div>
  <div class="card">
    <div class="form-field"><label>名前を選択</label><select id="name-select"><option value="">-- 選択してください --</option></select></div>
    <button class="btn btn-accent" onclick="saveName()">この名前で開始 →</button>
  </div>
</div>

<!-- MAIN -->
<div class="main-screen" id="main-screen">
  <div class="pages">

    <!-- 打刻ページ -->
    <div id="page-stamp" class="page active">
      <div class="page-title">打刻</div>
      <div class="page-sub" id="today-label"></div>
      <div class="conn-bar"><div class="dot dot-off" id="conn-dot"></div><span id="conn-label">接続中...</span></div>
      <div class="info-card">
        <div class="info-label">ログイン中</div>
        <div class="info-value" id="my-name">—</div>
      </div>
      <div class="type-sel">
        <button class="type-btn active in" id="type-in" onclick="setType('in')">▲ 出勤</button>
        <button class="type-btn out" id="type-out" onclick="setType('out')">▼ 退勤</button>
      </div>
      <!-- 勤務区分選択（掛け持ちの場合） -->
      <div class="wt-select-wrap" id="wt-wrap">
        <div class="info-card">
          <div class="info-label">今日の勤務区分</div>
          <select id="wt-select"></select>
        </div>
      </div>
      <!-- オンライン打刻（許可されている場合） -->
      <div id="online-btn-wrap" style="display:none">
        <button class="online-btn" onclick="doOnlineStamp()">
          <span style="font-size:22px">💻</span> オンライン打刻
        </button>
      </div>
      <div id="stamp-result"></div>
      <div style="margin-top:20px">
        <div style="font-size:11px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px">本日の打刻</div>
        <div class="info-card" style="padding:4px 16px;"><div id="today-hist"></div></div>
      </div>
    </div>

    <!-- 設定 -->
    <div id="page-settings" class="page">
      <div class="page-title">設定</div>
      <div class="page-sub">接続・アカウント</div>
      <div class="info-card" style="margin-bottom:12px">
        <div class="info-label">ログイン中</div>
        <div class="info-value" id="settings-name">—</div>
      </div>
      <button class="btn btn-ghost" onclick="changeName()" style="margin-bottom:10px">👤 名前を変更する</button>
      <div class="divider"></div>
      <div class="card">
        <div class="form-field"><label>Supabase URL</label><input type="url" id="set-url"></div>
        <div class="form-field"><label>Anon Key</label><input type="text" id="set-key"></div>
        <button class="btn btn-accent" onclick="updateConfig()" style="margin-bottom:10px">保存して再接続</button>
        <button class="btn btn-danger" onclick="logout()">⏏ ログアウト</button>
      </div>
    </div>

  </div>
  <nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('stamp',this)"><span class="nav-icon">⏱</span>打刻</button>
    <button class="nav-item" onclick="showPage('settings',this)"><span class="nav-icon">⚙️</span>設定</button>
  </nav>
</div>

<script>
const CFG='qr_att_v2', NAME_KEY='qr_att_v2_name';
let SB_URL='',SB_KEY='',myStaff=null,stampType='in',wtCache=[];

function getConfig(){ try{return JSON.parse(localStorage.getItem(CFG))||{};}catch(e){return {};} }
function saveCfg(u,k){ localStorage.setItem(CFG,JSON.stringify({url:u,key:k})); }

(function(){
  const p=new URLSearchParams(window.location.search);
  const pu=p.get('url'),pk=p.get('key');
  if(pu&&pk){ saveCfg(pu.replace(/\/$/,''),pk); }
  const cfg=getConfig();
  if(!cfg.url||!cfg.key){ document.getElementById('screen-config').classList.add('active'); return; }
  SB_URL=cfg.url; SB_KEY=cfg.key;
  const sid=localStorage.getItem(NAME_KEY);
  if(!sid){ loadStaffList(); } else { startMain(sid); }
})();

async function sb(path,opts={}){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    ...opts,
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'',...(opts.headers||{})}
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():null;
}

function setConn(ok){
  document.getElementById('conn-dot').className='dot '+(ok?'dot-on':'dot-off');
  document.getElementById('conn-label').textContent=ok?'接続中':'オフライン';
}

function fmtT(d){ return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtD(d){ return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0'); }

function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim().replace(/\/$/,'');
  const key=document.getElementById('cfg-key').value.trim();
  if(!url||!key){ alert('入力してください'); return; }
  saveCfg(url,key); SB_URL=url; SB_KEY=key;
  document.getElementById('screen-config').classList.remove('active');
  loadStaffList();
}

async function loadStaffList(){
  try{
    const staff=await sb('staff?select=*&order=name.asc');
    const sel=document.getElementById('name-select');
    sel.innerHTML='<option value="">-- 選択してください --</option>'+staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById('screen-name').classList.add('active');
  }catch(e){
    alert('接続エラー。URLとキーを確認してください。');
    document.getElementById('screen-config').classList.add('active');
  }
}

function saveName(){
  const id=document.getElementById('name-select').value;
  if(!id){ alert('名前を選択してください'); return; }
  localStorage.setItem(NAME_KEY,id);
  document.getElementById('screen-name').classList.remove('active');
  startMain(id);
}

async function startMain(staffId){
  try{
    const [staffArr,wts]=await Promise.all([
      sb(`staff?id=eq.${staffId}&select=*`),
      sb('work_types?select=*&order=name.asc')
    ]);
    if(!staffArr||!staffArr.length){ localStorage.removeItem(NAME_KEY); loadStaffList(); return; }
    myStaff=staffArr[0]; wtCache=wts; setConn(true);
  }catch(e){ setConn(false); myStaff={id:staffId,name:'(オフライン)',dept_id:null,work_type_ids:[],allow_online_stamp:false}; wtCache=[]; }

  document.getElementById('main-screen').classList.add('active');
  document.getElementById('my-name').textContent=myStaff.name;
  document.getElementById('settings-name').textContent=myStaff.name;
  document.getElementById('set-url').value=SB_URL;
  document.getElementById('set-key').value=SB_KEY;
  const now=new Date();
  document.getElementById('today-label').textContent=fmtD(now)+' '+['日','月','火','水','木','金','土'][now.getDay()]+'曜日';

  // 勤務区分セレクタ（掛け持ちの場合）
  const wtWrap=document.getElementById('wt-wrap');
  const wtSel=document.getElementById('wt-select');
  const wtIds=myStaff.work_type_ids||[];
  const myWts=wtIds.map(id=>wtCache.find(w=>w.id===id)).filter(Boolean);
  if(myWts.length>1){
    wtSel.innerHTML=myWts.map(w=>`<option value="${w.id}">${w.name}（${w.is_flex?'フレックス':w.start_time+'〜'+w.end_time}）</option>`).join('');
    wtWrap.classList.add('show');
  }

  // オンライン打刻ボタン
  if(myStaff.allow_online_stamp){
    document.getElementById('online-btn-wrap').style.display='block';
  }

  loadTodayHist();
}

function setType(t){
  stampType=t;
  document.getElementById('type-in').className='type-btn'+(t==='in'?' active in':'');
  document.getElementById('type-out').className='type-btn out'+(t==='out'?' active':'');
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function getSelectedWT(){
  const wtWrap=document.getElementById('wt-wrap');
  if(wtWrap.classList.contains('show')){
    const wtId=document.getElementById('wt-select').value;
    const wt=wtCache.find(w=>w.id===wtId);
    return wt||null;
  }
  const wtIds=myStaff.work_type_ids||[];
  if(wtIds.length===1) return wtCache.find(w=>w.id===wtIds[0])||null;
  return null;
}

async function doOnlineStamp(){
  if(!myStaff||myStaff.id==='') return;
  const wt=getSelectedWT();
  try{
    await sb('attendance',{method:'POST',prefer:'return=minimal',
      body:JSON.stringify({
        staff_id:myStaff.id, staff_name:myStaff.name,
        dept_id:myStaff.dept_id||null, dept_name:'',
        location_id:null, location_name:'',
        work_type_id:wt?.id||null, work_type_name:wt?.name||'',
        type:stampType, is_online:true, time:new Date().toISOString()
      })
    });
    showStampResult((stampType==='in'?'▲ 出勤':'▼ 退勤')+' オンライン打刻完了\n'+fmtT(new Date()),true);
    if(navigator.vibrate) navigator.vibrate([80,40,80]);
    loadTodayHist();
  }catch(e){ showStampResult('❌ 通信エラー',false); }
}

function showStampResult(msg,ok){
  const el=document.getElementById('stamp-result');
  el.innerHTML=`<div class="scan-result ${ok?'ok':'ng'}">${msg.replace('\n','<br>')}</div>`;
  if(ok) setTimeout(()=>{ el.innerHTML=''; },4000);
}

async function loadTodayHist(){
  const today=new Date().toISOString().slice(0,10);
  try{
    const recs=await sb(`attendance?staff_id=eq.${myStaff.id}&time=gte.${today}T00:00:00&time=lte.${today}T23:59:59&order=time.desc`);
    const el=document.getElementById('today-hist');
    if(!recs.length){ el.innerHTML='<div class="empty">本日の打刻はありません</div>'; return; }
    el.innerHTML=recs.map(r=>`<div class="hist-row">
      <div class="hist-time">${fmtT(new Date(r.time))}</div>
      <div class="hist-info"><div class="hist-loc">${r.location_name||(r.is_online?'オンライン':'不明')}</div></div>
      <span class="badge ${r.type==='in'?'badge-in':'badge-out'}">${r.type==='in'?'出勤':'退勤'}</span>
      ${r.is_online?'<span class="badge badge-online">オンライン</span>':''}
    </div>`).join('');
    setConn(true);
  }catch(e){ setConn(false); }
}

function changeName(){
  if(!confirm('名前を変更しますか？')) return;
  localStorage.removeItem(NAME_KEY);
  document.getElementById('main-screen').classList.remove('active');
  loadStaffList();
}
function updateConfig(){
  const url=document.getElementById('set-url').value.trim().replace(/\/$/,'');
  const key=document.getElementById('set-key').value.trim();
  if(!url||!key){ alert('入力してください'); return; }
  saveCfg(url,key); location.reload();
}
function logout(){
  if(!confirm('ログアウトしますか？')) return;
  localStorage.removeItem(CFG); localStorage.removeItem(NAME_KEY); location.reload();
}
</script>
</body>
</html>
